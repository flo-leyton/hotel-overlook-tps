    .operation-timeline {
      position: relative;
      padding-left: 1.75rem;

    .operation-timeline::before {
      position: absolute;
      top: .35rem;
      bottom: .35rem;
      left: .45rem;
      width: 2px;
      content: "";
      background: var(--bs-border-color);
    }
    .operation-item {
      position: relative;
      padding-bottom: 1.25rem;
    }
    .operation-item:last-child {
      padding-bottom: 0;
    }
    .operation-dot {
      position: absolute;
      top: .25rem;
      left: -1.72rem;
      width: .9rem;
      height: .9rem;
      border: 3px solid var(--bs-body-bg);
