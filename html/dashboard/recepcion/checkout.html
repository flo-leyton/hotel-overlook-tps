<!doctype html>
<html lang="es" dir="ltr" data-bs-theme="light" data-bs-theme-color="theme-color-default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Check-out de Huésped | Hotel Overlook</title>
  <link rel="shortcut icon" href="../../assets/images/favicon.ico">
  <link rel="stylesheet" href="../../assets/css/core/libs.min.css">
  <link rel="stylesheet" href="../../assets/css/hope-ui.min.css?v=5.0.0">
  <link rel="stylesheet" href="../../assets/css/custom.min.css?v=5.0.0">
  <link rel="stylesheet" href="../../assets/css/customizer.min.css?v=5.0.0">
  <link rel="stylesheet" href="../../assets/css/rtl.min.css?v=5.0.0">
  <link rel="stylesheet" href="../../assets/css/recepcion-ui.css">
  <link rel="stylesheet" href="../../assets/css/recepcion-fixes.css?v=12.4">
</head>
<body data-page="checkout.html" data-title="Check-out de Huésped" data-description="Cierre de estadía, resumen de cargos y liberación de habitación">
<template id="page-content">
  <div id="checkout-alerts"></div>
  <div class="card">
    <div class="card-body">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div><h4 class="mb-1">Check-out de Huésped</h4><p class="text-muted mb-0">Cierre de estadía, resumen de cargos y liberación de habitación</p></div>
        <div class="d-flex gap-2"><span class="badge bg-warning-subtle text-warning"><span id="checkout-pending-count">0 </span> salidas pendientes</span><span class="badge bg-primary-subtle text-primary" data-active-shift>Turno activo</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between"><div class="header-title"><h4 class="card-title mb-1">Proceso de check-out</h4><p class="text-muted mb-0">Complete los cuatro pasos para cerrar la estadía</p></div></div>
    <div class="card-body">
      <!-- TODO Fase refinamiento UI: revisar densidad del resumen de cargos y encabezado del wizard en tablet. -->
      <form id="form-wizard1" class="mt-3 text-center">
        <ul id="top-tab-list" class="p-0 row list-inline">
          <li class="mb-2 col-lg-3 col-md-6 text-start active" id="account"><a href="javascript:void(0);"><div class="iq-icon me-3"><svg class="svg-icon icon-20" width="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div><span class="dark-wizard">1. Seleccionar huésped</span></a></li>
          <li class="mb-2 col-lg-3 col-md-6 text-start" id="personal"><a href="javascript:void(0);"><div class="iq-icon me-3"><svg class="svg-icon icon-20" width="20" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v14H4zM8 9h8m-8 4h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="dark-wizard">2. Revisar estadía</span></a></li>
          <li class="mb-2 col-lg-3 col-md-6 text-start" id="payment"><a href="javascript:void(0);"><div class="iq-icon me-3"><svg class="svg-icon icon-20" width="20" viewBox="0 0 24 24" fill="none"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3Zm3 5h6m-6 4h6m-6 4h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="dark-wizard">3. Resumen de cargos</span></a></li>
          <li class="mb-2 col-lg-3 col-md-6 text-start" id="confirm"><a href="javascript:void(0);"><div class="iq-icon me-3"><svg class="svg-icon icon-20" width="20" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="dark-wizard">4. Finalizar check-out</span></a></li>
        </ul>

        <fieldset>
          <div class="form-card text-start">
            <div class="row"><div class="col-8"><h3 class="mb-4">Seleccionar huésped activo</h3></div><div class="col-4"><h2 class="steps">Paso 1 - 4</h2></div></div>
            <div class="row g-3 mb-4">
              <div class="col-md-3"><label class="form-label" for="checkoutRoom">Habitación</label><input class="form-control" id="checkoutRoom" type="search" placeholder="Ej. 202"></div>
              <div class="col-md-3"><label class="form-label" for="checkoutGuest">Nombre del huésped</label><input class="form-control" id="checkoutGuest" type="search" placeholder="Nombre completo"></div>
              <div class="col-md-3"><label class="form-label" for="checkoutDocument">Documento</label><input class="form-control" id="checkoutDocument" type="search" placeholder="C.I. o pasaporte"></div>
              <div class="col-md-3"><label class="form-label" for="checkoutReservation">Código de reserva</label><input class="form-control" id="checkoutReservation" type="search" placeholder="RSV-1008"></div>
            </div>
            <div class="table-responsive"><table class="table table-striped align-middle"><thead><tr><th>Reserva</th><th>Huésped</th><th>Habitación</th><th>Tipo</th><th>Entrada</th><th>Salida</th><th>Estado</th><th class="text-end">Acción</th></tr></thead><tbody id="checkout-reservations-body"><tr><td><strong>RSV-1008</strong></td><td>Carlos Méndez</td><td>202</td><td>Doble</td><td>20/06/2026</td><td>22/06/2026</td><td><span class="badge bg-primary">Check-in</span></td><td class="text-end"><button class="btn btn-sm btn-primary" type="button">Seleccionar huésped</button></td></tr><tr><td><strong>RSV-1015</strong></td><td>Lucía Paredes</td><td>305</td><td>Matrimonial</td><td>19/06/2026</td><td>22/06/2026</td><td><span class="badge bg-primary">Check-in</span></td><td class="text-end"><button class="btn btn-sm btn-primary" type="button">Seleccionar huésped</button></td></tr><tr><td><strong>RSV-1016</strong></td><td>Roberto Vargas</td><td>118</td><td>Simple</td><td>21/06/2026</td><td>22/06/2026</td><td><span class="badge bg-primary">Check-in</span></td><td class="text-end"><button class="btn btn-sm btn-primary" type="button">Seleccionar huésped</button></td></tr></tbody></table></div>
          </div>
          <button type="button" name="next" class="btn btn-primary next action-button float-end" value="Next">Continuar</button>
        </fieldset>

        <fieldset>
          <div class="form-card text-start">
            <div class="row"><div class="col-8"><h3 class="mb-4">Revisar estadía</h3></div><div class="col-4"><h2 class="steps">Paso 2 - 4</h2></div></div>
            <div class="alert alert-info">Revise las fechas y la habitación antes de calcular el cierre de estadía.</div>
            <div class="card border"><div class="card-body"><div class="row g-3"><div class="col-md-4"><small class="text-muted d-block">Huésped</small><strong id="checkout-stay-guest">Carlos Méndez</strong></div><div class="col-md-4"><small class="text-muted d-block">Documento</small><strong id="checkout-stay-document">6541237</strong></div><div class="col-md-4"><small class="text-muted d-block">Habitación</small><strong id="checkout-stay-room">202</strong></div><div class="col-md-4"><small class="text-muted d-block">Tipo</small><strong id="checkout-stay-type">Doble</strong></div><div class="col-md-4"><small class="text-muted d-block">Entrada</small><strong id="checkout-stay-arrival">20/06/2026</strong></div><div class="col-md-4"><small class="text-muted d-block">Salida</small><strong id="checkout-stay-departure">22/06/2026</strong></div><div class="col-md-4"><small class="text-muted d-block">Número de noches</small><strong id="checkout-stay-nights">2</strong></div><div class="col-md-4"><small class="text-muted d-block">Tarifa por noche</small><strong>Calculada en el siguiente paso</strong></div><div class="col-md-4"><small class="text-muted d-block">Estado actual</small><span class="badge bg-primary">Check-in</span></div></div></div></div>
          </div>
          <button type="button" name="next" class="btn btn-primary next action-button float-end" value="Next">Calcular cierre</button>
          <button type="button" name="previous" class="btn btn-dark previous action-button-previous float-end me-1 text-white" value="Previous">Anterior</button>
        </fieldset>

        <fieldset>
          <div class="form-card text-start">
            <div class="row"><div class="col-8"><h3 class="mb-4">Resumen operativo de cargos</h3></div><div class="col-4"><h2 class="steps">Paso 3 - 4</h2></div></div>
            <div class="card rounded border">
              <div class="card-body">
                <div class="row mb-4"><div class="col-sm-8"><h4 class="mb-1">Carlos Méndez</h4><p class="text-muted mb-0">Reserva RSV-1008 · Habitación 202 Doble</p></div><div class="col-sm-4 text-sm-end"><span class="badge bg-primary">Resumen referencial</span></div></div>
                <div class="table-responsive-lg">
                  <table class="table">
                    <thead><tr><th>Concepto</th><th class="text-center">Cantidad</th><th class="text-center">Importe unitario</th><th class="text-end">Subtotal</th></tr></thead>
                    <tbody>
                      <tr><td><h6 class="mb-0">Hospedaje</h6><p class="mb-0 text-muted">Estadía seleccionada</p></td><td class="text-center"><input class="form-control form-control-sm" id="checkout-nights" type="number" min="1" value="2"></td><td class="text-center"><input class="form-control form-control-sm" id="checkout-night-rate" type="number" min="0" value="380"></td><td class="text-end" id="checkout-subtotal">Bs 760</td></tr>
                      <tr><td><h6 class="mb-0">Servicios adicionales</h6><p class="mb-0 text-muted">Desayuno, lavandería u otros</p></td><td></td><td class="text-center"><input class="form-control form-control-sm" id="checkout-services" type="number" min="0" value="0"></td><td class="text-end" id="checkout-services-total">Bs 0</td></tr>
                      <tr><td><h6 class="mb-0">Descuentos</h6><p class="mb-0 text-muted">Si corresponde</p></td><td></td><td class="text-center"><input class="form-control form-control-sm" id="checkout-discounts" type="number" min="0" value="0"></td><td class="text-end" id="checkout-discounts-total">Bs 0</td></tr>
                      <tr class="table-primary"><td><h5 class="mb-0">Total estimado</h5></td><td></td><td></td><td class="text-end"><h5 class="mb-0" id="checkout-total">Bs 760</h5></td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="alert alert-warning mb-0">Resumen interno de la estadía. Verifique los importes antes de finalizar el check-out.</div>
                <div class="mt-3"><label class="form-label" for="checkout-observations">Observaciones</label><textarea class="form-control" id="checkout-observations" rows="2"></textarea></div>
              </div>
            </div>
          </div>
          <button type="button" name="next" class="btn btn-primary next action-button float-end" value="Submit">Revisar cierre</button>
          <button type="button" name="previous" class="btn btn-dark previous action-button-previous float-end me-1 text-white" value="Previous">Anterior</button>
        </fieldset>

        <fieldset>
          <div class="form-card text-start">
            <div class="row"><div class="col-8"><h3 class="mb-4">Finalizar check-out</h3></div><div class="col-4"><h2 class="steps">Paso 4 - 4</h2></div></div>
            <div class="card border"><div class="card-body"><div class="row g-3"><div class="col-md-4"><small class="text-muted d-block">Reserva</small><strong id="checkout-summary-code">RSV-1008</strong></div><div class="col-md-4"><small class="text-muted d-block">Huésped</small><strong id="checkout-summary-guest">Carlos Méndez</strong></div><div class="col-md-4"><small class="text-muted d-block">Habitación</small><strong id="checkout-summary-room">202 · Doble</strong></div><div class="col-md-4"><small class="text-muted d-block">Total estimado</small><strong id="checkout-summary-total">Bs 840</strong></div><div class="col-md-4"><small class="text-muted d-block">Estado final reserva</small><span class="badge bg-success">Check-out</span></div><div class="col-md-4"><small class="text-muted d-block">Nuevo estado habitación</small><span class="badge bg-warning text-dark">Limpieza</span></div><div class="col-md-6"><small class="text-muted d-block">Usuario responsable</small><strong data-active-user-name>Usuario activo</strong></div><div class="col-md-6"><small class="text-muted d-block">Fecha y hora</small><strong data-current-datetime>Al confirmar</strong></div></div><hr><div class="d-flex flex-wrap gap-2"><span class="badge bg-success">Reserva: Check-in → Check-out</span><span class="badge bg-warning text-dark">Habitación: Ocupada → Limpieza</span><span class="badge bg-primary">Operación registrada</span></div></div></div>
            <div class="alert alert-success collapse" id="checkoutSuccess">Check-out registrado correctamente. La reserva cambió a estado Check-out y la habitación a Limpieza.</div>
            <div class="d-flex flex-wrap justify-content-end gap-2"><a class="btn btn-outline-secondary" href="dashboard-recepcion.html">Cancelar operación</a><button class="btn btn-success" id="confirm-checkout-button" type="button">Finalizar check-out</button></div>
          </div>
          <button type="button" name="previous" class="btn btn-dark previous action-button-previous float-end me-1 mt-3 text-white" value="Previous">Anterior</button>
        </fieldset>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex flex-wrap justify-content-between gap-2"><div><h4 class="card-title mb-1">Check-outs realizados hoy</h4><p class="text-muted mb-0">Cierres operativos completados durante el turno</p></div><span class="badge bg-success-subtle text-success">Historial centralizado</span></div>
    <div class="card-body"><p class="text-muted mb-0">Los check-outs completados se consultan en el historial de <a href="operaciones.html">Operaciones</a>.</p></div>
  </div>
</template>
<script src="../../assets/js/recepcion/auth.js?v=12.5"></script><script src="recepcion-layout.js?v=12.3"></script><script src="../../assets/js/core/libs.min.js"></script><script src="../../assets/js/core/external.min.js"></script><script src="../../assets/js/plugins/form-wizard.js"></script><script src="../../assets/js/plugins/setting.js"></script><script src="../../assets/js/hope-ui.js" defer></script><script src="../../assets/js/recepcion/api.js?v=12.5"></script><script src="../../assets/js/recepcion/checkout.js?v=12.2"></script>
</body>
</html>
